<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dual Puzzle Arcade · Memory Match + Slide Puzzle</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #101f2c 0%, #0a121c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* MAIN GAME SHELL */
        .dual-game-hub {
            max-width: 700px;
            width: 100%;
            background: rgba(18, 30, 40, 0.7);
            backdrop-filter: blur(3px);
            border-radius: 70px;
            padding: 18px 20px 28px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,240,0.2);
        }

        .game-tab-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .tab-btn {
            background: #1f3e4b;
            border: none;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 10px 28px;
            border-radius: 60px;
            color: #c6e9ff;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            letter-spacing: 0.5px;
        }

        .tab-btn.active {
            background: #f4b942;
            color: #1e2f3a;
            box-shadow: 0 0 12px #ffcd7e;
        }

        .game-panel {
            display: none;
            animation: fadeSlide 0.25s ease;
        }

        .game-panel.active-panel {
            display: block;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* shared card styles for both games */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            background: #07121cd9;
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .stat {
            display: flex;
            gap: 8px;
            align-items: baseline;
            font-weight: 600;
        }

        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9bbad4;
        }

        .stat-value {
            font-size: 1.7rem;
            font-weight: 800;
            color: #f7e9c3;
            font-family: monospace;
        }

        .action-btn {
            background: #f4c542;
            border: none;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 3px 0 #9b5e1a;
            transition: 0.05s linear;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #9b5e1a;
        }

        /* MEMORY GRID (4x4) */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(70px, 95px));
            gap: 12px;
            justify-content: center;
            padding: 10px;
        }

        /* SLIDE PUZZLE (3x3) */
        .slide-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            background: #0A1620;
            padding: 16px;
            border-radius: 44px;
            aspect-ratio: 1 / 1;
            max-width: 420px;
            margin: 0 auto;
        }

        .tile {
            background: linear-gradient(145deg, #2a5f7a, #134257);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            color: #FFE3B0;
            cursor: pointer;
            transition: 0.08s linear;
            box-shadow: 0 8px 0 #08212e;
            aspect-ratio: 1 / 1;
            text-shadow: 2px 2px 0 #1a3a48;
        }

        .tile.empty {
            background: #1c3c48;
            box-shadow: inset 0 0 0 2px #4f8faa;
            cursor: default;
            color: #2f6b7c;
            font-size: 1.4rem;
        }

        .message-area {
            margin-top: 18px;
            text-align: center;
            background: #07121cbb;
            border-radius: 60px;
            padding: 10px;
            font-weight: bold;
            color: #ecf9ff;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #6c8dab;
        }
    </style>
</head>
<body>
<div class="dual-game-hub">
    <div class="game-tab-bar">
        <button class="tab-btn active" data-game="memory">🧠 MEMORY MATCH</button>
        <button class="tab-btn" data-game="slide">🔄 SLIDE PUZZLE</button>
    </div>

    <!-- MEMORY GAME PANEL -->
    <div id="memoryPanel" class="game-panel active-panel">
        <div class="stats-bar">
            <div class="stat"><span class="stat-label">MOVES</span><span class="stat-value" id="memMoves">0</span></div>
            <div class="stat"><span class="stat-label">PAIRS</span><span class="stat-value" id="memPairs">0</span><span class="stat-label">/8</span></div>
            <button class="action-btn" id="resetMemoryBtn">⟳ NEW GAME</button>
        </div>
        <div id="memoryGrid" class="memory-grid"></div>
        <div id="memMessage" class="message-area">✨ flip & match the icons ✨</div>
        <footer>🐟 classic matching · mismatch sound "tui bolod naki?" 🐙</footer>
    </div>

    <!-- SLIDE PUZZLE PANEL -->
    <div id="slidePanel" class="game-panel">
        <div class="stats-bar">
            <div class="stat"><span class="stat-label">MOVES</span><span class="stat-value" id="slideMoves">0</span></div>
            <div class="stat"></div>
            <button class="action-btn" id="resetSlideBtn">🔀 SHUFFLE</button>
        </div>
        <div id="slideGrid" class="slide-grid"></div>
        <div id="slideMessage" class="message-area">⬅️ tap tile next to empty space to slide</div>
        <footer>🌟 3x3 sliding puzzle · arrange numbers 1-8 + empty</footer>
    </div>
</div>

<script>
    // ----------------------------------------------
    // 1. MEMORY MATCH (with sound effect)
    // ----------------------------------------------
    const ICON_SET = ["🐠", "🐟", "🐙", "🦑", "🐬", "🐳", "🐚", "🌟"];
    const TOTAL_PAIRS = 8;
    
    let memCards = [];
    let memMoves = 0;
    let memMatched = 0;
    let lockBoard = false;
    let firstIdx = null, secondIdx = null;
    let flipTimeout = null;
    let soundEnabled = true;   // always on for mismatch laugh
    
    // DOM memory elements
    const memoryGridDiv = document.getElementById('memoryGrid');
    const memMovesSpan = document.getElementById('memMoves');
    const memPairsSpan = document.getElementById('memPairs');
    const resetMemBtn = document.getElementById('resetMemoryBtn');
    const memMessageDiv = document.getElementById('memMessage');
    
    // play mismatch TTS "tui bolod naki?"
    function playMismatchSound() {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("tui bolod naki?");
        utterance.lang = "bn-BD";
        utterance.rate = 0.95;
        utterance.pitch = 1.15;
        utterance.volume = 0.9;
        // attempt google-like voice
        const setVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            let selected = voices.find(v => v.name.includes('Google') && (v.lang.includes('bn') || v.lang.includes('en')));
            if (!selected) selected = voices.find(v => v.lang.includes('bn'));
            if (selected) utterance.voice = selected;
        };
        if (window.speechSynthesis.getVoices().length) setVoice();
        else window.speechSynthesis.onvoiceschanged = setVoice;
        window.speechSynthesis.speak(utterance);
    }
    
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function initMemoryGame() {
        if (flipTimeout) clearTimeout(flipTimeout);
        let deck = [];
        for (let i = 0; i < TOTAL_PAIRS; i++) {
            deck.push({ icon: ICON_SET[i], matched: false, flipped: false });
            deck.push({ icon: ICON_SET[i], matched: false, flipped: false });
        }
        deck = shuffleArray(deck);
        memCards = deck.map((c, idx) => ({ id: idx, icon: c.icon, matched: false, flipped: false }));
        memMoves = 0;
        memMatched = 0;
        firstIdx = null;
        secondIdx = null;
        lockBoard = false;
        memMovesSpan.innerText = memMoves;
        memPairsSpan.innerText = memMatched;
        memMessageDiv.innerHTML = "🧩 new memory match! 🧩";
        memMessageDiv.style.background = "#07121cbb";
        renderMemoryGrid();
    }
    
    function renderMemoryGrid() {
        memoryGridDiv.innerHTML = '';
        memCards.forEach((card, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.style.cssText = `
                aspect-ratio: 1 / 1;
                background: transparent;
                perspective: 500px;
                cursor: pointer;
            `;
            const inner = document.createElement('div');
            inner.style.cssText = `
                position: relative; width: 100%; height: 100%;
                transition: transform 0.25s ease; transform-style: preserve-3d; border-radius: 20px;
                box-shadow: 0 8px 14px rgba(0,0,0,0.4);
            `;
            const front = document.createElement('div');
            front.style.cssText = `
                position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
                border-radius: 20px; background: radial-gradient(circle at 30% 25%, #ffefc0, #ffd78c);
                display: flex; align-items: center; justify-content: center;
                font-size: 2.2rem; transform: rotateY(180deg);
            `;
            front.innerText = card.icon;
            const back = document.createElement('div');
            back.style.cssText = `
                position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
                border-radius: 20px; background: linear-gradient(145deg, #2c6a85, #16495e);
                display: flex; align-items: center; justify-content: center;
                font-size: 2rem; font-weight: bold; color: #ffdd99;
            `;
            back.innerText = "?";
            inner.appendChild(front);
            inner.appendChild(back);
            cardDiv.appendChild(inner);
            if (card.flipped || card.matched) inner.style.transform = 'rotateY(180deg)';
            if (card.matched) cardDiv.style.filter = 'drop-shadow(0 0 5px #a3f0c0)';
            if (lockBoard && !card.matched && !card.flipped) cardDiv.style.pointerEvents = 'none';
            cardDiv.addEventListener('click', (e) => {
                e.stopPropagation();
                if (lockBoard) return;
                if (card.matched || card.flipped) return;
                handleMemoryClick(idx);
            });
            memoryGridDiv.appendChild(cardDiv);
        });
    }
    
    function handleMemoryClick(clickedIdx) {
        if (lockBoard) return;
        if (memCards[clickedIdx].matched || memCards[clickedIdx].flipped) return;
        if (firstIdx !== null && secondIdx !== null) return;
        
        if (firstIdx === null) {
            // flip first
            memCards[clickedIdx].flipped = true;
            firstIdx = clickedIdx;
            renderMemoryGrid();
            return;
        }
        
        if (firstIdx !== null && secondIdx === null && firstIdx !== clickedIdx) {
            memCards[clickedIdx].flipped = true;
            secondIdx = clickedIdx;
            memMoves++;
            memMovesSpan.innerText = memMoves;
            renderMemoryGrid();
            
            const cardA = memCards[firstIdx];
            const cardB = memCards[clickedIdx];
            const isMatch = (cardA.icon === cardB.icon);
            
            if (isMatch) {
                cardA.matched = true;
                cardB.matched = true;
                cardA.flipped = true;
                cardB.flipped = true;
                memMatched++;
                memPairsSpan.innerText = memMatched;
                firstIdx = null;
                secondIdx = null;
                renderMemoryGrid();
                if (memMatched === TOTAL_PAIRS) {
                    memMessageDiv.innerHTML = "🎉 MEMORY VICTORY! 🎉";
                    memMessageDiv.style.background = "#f3b33daa";
                    lockBoard = true;
                    createConfettiEffect();
                } else {
                    memMessageDiv.innerHTML = "✔️ Match! +1 pair";
                    setTimeout(() => { if (memMatched !== TOTAL_PAIRS) memMessageDiv.innerHTML = "✨ keep matching ✨"; }, 900);
                }
            } else {
                // MISMATCH with GOOGLE SOUND "tui bolod naki?"
                playMismatchSound();
                lockBoard = true;
                memMessageDiv.innerHTML = "❌ mismatch! 'tui bolod naki?' ❌";
                memMessageDiv.style.background = "#8b3020aa";
                flipTimeout = setTimeout(() => {
                    if (!memCards[firstIdx]?.matched) memCards[firstIdx].flipped = false;
                    if (!memCards[secondIdx]?.matched) memCards[secondIdx].flipped = false;
                    firstIdx = null;
                    secondIdx = null;
                    lockBoard = false;
                    renderMemoryGrid();
                    if (memMatched !== TOTAL_PAIRS) {
                        memMessageDiv.innerHTML = "✨ flip tiles & match ✨";
                        memMessageDiv.style.background = "#07121cbb";
                    }
                    flipTimeout = null;
                }, 700);
                renderMemoryGrid();
            }
        }
    }
    
    function resetMemory() {
        if (flipTimeout) clearTimeout(flipTimeout);
        lockBoard = false;
        firstIdx = secondIdx = null;
        initMemoryGame();
    }
    
    // ----------------------------------------------
    // 2. SLIDING PUZZLE (3x3)
    // ----------------------------------------------
    let slideTiles = [];      // 1D array length 9, 0 represents empty
    let slideMoves = 0;
    let slideSolved = false;
    const slideGridDiv = document.getElementById('slideGrid');
    const slideMovesSpan = document.getElementById('slideMoves');
    const resetSlideBtn = document.getElementById('resetSlideBtn');
    const slideMessageDiv = document.getElementById('slideMessage');
    
    function initSlidePuzzle() {
        // goal: [1,2,3,4,5,6,7,8,0]
        let arr = [1,2,3,4,5,6,7,8,0];
        do {  // shuffle until solvable (simple parity check)
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        } while (!isSolvable(arr));
        slideTiles = [...arr];
        slideMoves = 0;
        slideSolved = false;
        slideMovesSpan.innerText = slideMoves;
        slideMessageDiv.innerHTML = "⬅️ tap tile next to empty space to slide";
        slideMessageDiv.style.background = "#07121cbb";
        renderSlideGrid();
    }
    
    function isSolvable(tiles) {
        let invCount = 0;
        const flat = tiles.filter(v => v !== 0);
        for (let i = 0; i < flat.length; i++) {
            for (let j = i+1; j < flat.length; j++) {
                if (flat[i] > flat[j]) invCount++;
            }
        }
        const emptyRow = Math.floor(tiles.indexOf(0) / 3);
        // for odd grid width (3) solvable if inversion count even
        return (invCount % 2 === 0);
    }
    
    function renderSlideGrid() {
        slideGridDiv.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const val = slideTiles[i];
            const tileDiv = document.createElement('div');
            tileDiv.classList.add('tile');
            if (val === 0) {
                tileDiv.classList.add('empty');
                tileDiv.innerText = '☆';
            } else {
                tileDiv.innerText = val;
            }
            tileDiv.addEventListener('click', (function(index) {
                return function() { handleSlideClick(index); };
            })(i));
            slideGridDiv.appendChild(tileDiv);
        }
        if (checkWin() && !slideSolved) {
            slideSolved = true;
            slideMessageDiv.innerHTML = "🎉 PUZZLE SOLVED! WINNER! 🎉";
            slideMessageDiv.style.background = "#f3b33daa";
            createConfettiEffect();
            lockBoard = false;
        }
    }
    
    function handleSlideClick(idx) {
        if (slideSolved) return;
        const emptyIdx = slideTiles.indexOf(0);
        const rowEmpty = Math.floor(emptyIdx / 3);
        const colEmpty = emptyIdx % 3;
        const rowTile = Math.floor(idx / 3);
        const colTile = idx % 3;
        const isAdjacent = (Math.abs(rowEmpty - rowTile) + Math.abs(colEmpty - colTile)) === 1;
        if (isAdjacent) {
            // swap
            [slideTiles[emptyIdx], slideTiles[idx]] = [slideTiles[idx], slideTiles[emptyIdx]];
            slideMoves++;
            slideMovesSpan.innerText = slideMoves;
            renderSlideGrid();
            if (checkWin()) {
                slideSolved = true;
                slideMessageDiv.innerHTML = "🎉 PERFECT! SLIDE PUZZLE COMPLETE! 🎉";
                slideMessageDiv.style.background = "#f3b33daa";
                createConfettiEffect();
            } else {
                slideMessageDiv.innerHTML = "👍 keep sliding!";
                setTimeout(() => {
                    if (!slideSolved) slideMessageDiv.innerHTML = "⬅️ tap tile next to empty space to slide";
                }, 800);
            }
        } else {
            slideMessageDiv.innerHTML = "🚫 only tile next to empty space!";
            setTimeout(() => {
                if (!slideSolved) slideMessageDiv.innerHTML = "⬅️ tap tile next to empty space to slide";
            }, 700);
        }
    }
    
    function checkWin() {
        for (let i = 0; i < 8; i++) {
            if (slideTiles[i] !== i+1) return false;
        }
        return slideTiles[8] === 0;
    }
    
    function resetSlide() {
        initSlidePuzzle();
    }
    
    // ----- confetti (shared) -----
    function createConfettiEffect() {
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '1000';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        const colors = ['#f5bc70', '#f5a97f', '#f4c542', '#a7d489', '#7dc4e8', '#e9692c'];
        for (let i = 0; i < 100; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 8 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedY: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 3,
                rotation: Math.random() * 360,
            });
        }
        let animId;
        const start = performance.now();
        function draw(now) {
            if (now - start > 1900) { cancelAnimationFrame(animId); canvas.remove(); return; }
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let p of particles) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI/180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
                p.x += p.speedX;
                p.y += p.speedY;
                p.rotation += 8;
                if (p.y > canvas.height+50) p.y = -40;
                if (p.x < -60) p.x = canvas.width+40;
                if (p.x > canvas.width+60) p.x = -40;
            }
            animId = requestAnimationFrame(draw);
        }
        animId = requestAnimationFrame(draw);
        setTimeout(() => { if (animId) cancelAnimationFrame(animId); if(canvas.remove) canvas.remove(); }, 2000);
    }
    
    // ---- TAB SWITCHING ----
    const memoryPanel = document.getElementById('memoryPanel');
    const slidePanel = document.getElementById('slidePanel');
    const tabBtns = document.querySelectorAll('.tab-btn');
    
    function switchGame(gameId) {
        if (gameId === 'memory') {
            memoryPanel.classList.add('active-panel');
            slidePanel.classList.remove('active-panel');
            tabBtns[0].classList.add('active');
            tabBtns[1].classList.remove('active');
        } else {
            memoryPanel.classList.remove('active-panel');
            slidePanel.classList.add('active-panel');
            tabBtns[0].classList.remove('active');
            tabBtns[1].classList.add('active');
            // optional: re-render slide puzzle if needed
            if (!slideTiles.length) initSlidePuzzle(); else renderSlideGrid();
        }
    }
    
    tabBtns[0].addEventListener('click', () => switchGame('memory'));
    tabBtns[1].addEventListener('click', () => switchGame('slide'));
    resetMemBtn.addEventListener('click', resetMemory);
    resetSlideBtn.addEventListener('click', resetSlide);
    
    // initializations
    initMemoryGame();
    initSlidePuzzle();
</script>
</body>
</html>
