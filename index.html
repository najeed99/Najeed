<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEO CITY - Open World Game (GTA Style)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', 'Arial', sans-serif; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 0 black;
        }
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        #health-bar {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
            height: 16px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ff4444;
            pointer-events: none;
            z-index: 10;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: #ff3333;
            transition: width 0.2s;
        }
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid black;
            pointer-events: none;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div id="info">
        🚀 NEO CITY | Open World | W/A/S/D = Move | Mouse = Look | Click = Shoot
    </div>
    <div id="controls-info">
        🎮 [E] Enter Car | [Space] Jump | [Shift] Run | [R] Reload
    </div>
    <div id="health-bar">
        <div id="health-fill"></div>
    </div>
    <div class="crosshair"></div>

    <!-- Import Three.js core and add-ons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- setup scene, camera, renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a);
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // atmospheric fog
        
        // camera (first person)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // high quality shadows
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        // CSS2 renderer for text labels
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);
        
        // --- lighting (realistic) ---
        // ambient
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        // main directional light (sun)
        const sunLight = new THREE.DirectionalLight(0xfff5d1, 1.2);
        sunLight.position.set(50, 30, 20);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 1024;
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 100;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        scene.add(sunLight);
        // fill light from below
        const fillLight = new THREE.PointLight(0x4466cc, 0.4);
        fillLight.position.set(0, -5, 0);
        scene.add(fillLight);
        // back rim light
        const rimLight = new THREE.PointLight(0xffaa66, 0.6);
        rimLight.position.set(-10, 15, -15);
        scene.add(rimLight);
        
        // ground plane with grid + reflective material (city ground)
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1f2e, roughness: 0.7, metalness: 0.2 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.05;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // grid helper for reference
        const gridHelper = new THREE.GridHelper(200, 40, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.02;
        scene.add(gridHelper);
        
        // --- building generation (basic city blocks) ---
        const buildingColors = [0x7a8c9e, 0x6c7a89, 0x5d6d7e, 0x4a5b6e, 0x9aaec0, 0xb0c4de];
        const buildings = [];
        
        for (let i = -8; i <= 8; i++) {
            for (let j = -8; j <= 8; j++) {
                if (Math.random() > 0.65) continue; // spacing
                const width = 0.8 + Math.random() * 0.6;
                const depth = 0.8 + Math.random() * 0.6;
                const height = 0.8 + Math.random() * 2.5;
                const boxGeo = new THREE.BoxGeometry(width, height, depth);
                const material = new THREE.MeshStandardMaterial({ color: buildingColors[Math.floor(Math.random() * buildingColors.length)], roughness: 0.3, metalness: 0.7 });
                const building = new THREE.Mesh(boxGeo, material);
                const posX = (i + (Math.random() - 0.5) * 0.4) * 1.6;
                const posZ = (j + (Math.random() - 0.5) * 0.4) * 1.6;
                building.position.set(posX, height / 2, posZ);
                building.castShadow = true;
                building.receiveShadow = true;
                scene.add(building);
                buildings.push(building);
            }
        }
        
        // add some tower blocks
        const towerMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50, metalness: 0.85, roughness: 0.2 });
        for (let t = 0; t < 15; t++) {
            const towerGeo = new THREE.CylinderGeometry(0.7, 0.9, 2.8, 8);
            const tower = new THREE.Mesh(towerGeo, towerMat);
            const angle = (t / 15) * Math.PI * 2;
            const radius = 12;
            tower.position.set(Math.cos(angle) * radius, 1.4, Math.sin(angle) * radius);
            tower.castShadow = true;
            scene.add(tower);
        }
        
        // --- simple roads (decorative lines)
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x2c2f36, roughness: 0.5 });
        for (let r = -12; r <= 12; r+=2.5) {
            const roadStrip = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.05, 20), roadMat);
            roadStrip.position.set(r, -0.02, 0);
            roadStrip.receiveShadow = true;
            scene.add(roadStrip);
            
            const roadStripZ = new THREE.Mesh(new THREE.BoxGeometry(20, 0.05, 0.2), roadMat);
            roadStripZ.position.set(0, -0.02, r);
            roadStripZ.receiveShadow = true;
            scene.add(roadStripZ);
        }
        
        // --- player object (simple capsule representation)
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.2, 8);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, metalness: 0.2, emissive: 0x114466 });
        const playerMesh = new THREE.Mesh(bodyGeo, playerMat);
        playerMesh.castShadow = true;
        playerMesh.position.y = 0.6;
        playerGroup.add(playerMesh);
        
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffaa77 });
        const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
        leftEye.position.set(-0.2, 0.85, 0.45);
        const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.1, 16, 16), eyeMat);
        rightEye.position.set(0.2, 0.85, 0.45);
        playerGroup.add(leftEye);
        playerGroup.add(rightEye);
        
        scene.add(playerGroup);
        playerGroup.position.set(0, 0, 0);
        
        // --- simple vehicle spawn (one sports car)
        const carGroup = new THREE.Group();
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.4, 1.6), new THREE.MeshStandardMaterial({ color: 0xdd3333, metalness: 0.8, roughness: 0.2 }));
        carBody.position.y = 0.2;
        carBody.castShadow = true;
        carGroup.add(carBody);
        const roof = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.3, 1.0), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        roof.position.y = 0.55;
        roof.castShadow = true;
        carGroup.add(roof);
        // wheels
        const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const positions = [[-0.5, 0.1, -0.7], [0.5, 0.1, -0.7], [-0.5, 0.1, 0.7], [0.5, 0.1, 0.7]];
        positions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI/2;
            wheel.position.set(pos[0], pos[1], pos[2]);
            wheel.castShadow = true;
            carGroup.add(wheel);
        });
        carGroup.position.set(5, 0, 4);
        scene.add(carGroup);
        
        // --- player control vars
        const keyState = { w: false, s: false, a: false, d: false, shift: false, space: false };
        let moveSpeed = 5.5;
        let velocityY = 0;
        let isGrounded = true;
        let nearVehicle = false;
        let inVehicle = false;
        let vehicleObj = null;
        let cameraOffset = new THREE.Vector3(0, 1.7, 0);
        
        // mouse look
        let mouseX = 0, mouseY = 0;
        let pitch = 0;
        let yaw = -Math.PI / 4;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                if (pitch > Math.PI/2.2) pitch = Math.PI/2.2;
                if (pitch < -Math.PI/2.2) pitch = -Math.PI/2.2;
            }
        });
        
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        
        // keyboard events
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keyState.w = true;
            if (k === 's') keyState.s = true;
            if (k === 'a') keyState.a = true;
            if (k === 'd') keyState.d = true;
            if (k === 'shift') keyState.shift = true;
            if (k === ' ') { keyState.space = true; e.preventDefault(); }
            if (k === 'e') {
                if (nearVehicle && !inVehicle) {
                    inVehicle = true;
                    vehicleObj = carGroup;
                    playerGroup.visible = false;
                    cameraOffset.set(0, 1.2, 2.2);
                } else if (inVehicle) {
                    inVehicle = false;
                    vehicleObj = null;
                    playerGroup.visible = true;
                    cameraOffset.set(0, 1.7, 0);
                    playerGroup.position.copy(carGroup.position);
                }
            }
        });
        
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keyState.w = false;
            if (k === 's') keyState.s = false;
            if (k === 'a') keyState.a = false;
            if (k === 'd') keyState.d = false;
            if (k === 'shift') keyState.shift = false;
            if (k === ' ') keyState.space = false;
        });
        
        // simple collision detection with buildings
        function checkCollision(pos, radius = 0.5) {
            for (let b of buildings) {
                const bbox = new THREE.Box3().setFromObject(b);
                const pbox = new THREE.Box3().setFromCenterAndSize(pos, new THREE.Vector3(radius*2, 1.2, radius*2));
                if (bbox.intersectsBox(pbox)) return true;
            }
            // boundary
            if (Math.abs(pos.x) > 22 || Math.abs(pos.z) > 22) return true;
            return false;
        }
        
        // weapon system (basic projectile)
        const bullets = [];
        function shoot() {
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const origin = inVehicle ? vehicleObj.position.clone().add(new THREE.Vector3(0, 0.8, 0)) : playerGroup.position.clone().add(new THREE.Vector3(0, 0.8, 0));
            const bulletGeo = new THREE.SphereGeometry(0.08, 6, 6);
            const bulletMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff2200 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            bullet.position.copy(origin);
            bullet.userData = { vel: direction.multiplyScalar(25), life: 100 };
            scene.add(bullet);
            bullets.push(bullet);
        }
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && document.pointerLockElement === renderer.domElement) {
                shoot();
            }
        });
        
        // update health bar random for demo (just UI)
        let health = 100;
        const healthFill = document.getElementById('health-fill');
        function takeDamage(amt) {
            health = Math.max(0, health - amt);
            healthFill.style.width = (health) + '%';
            if (health <= 0) {
                alert("You died! Respawn.");
                health = 100;
                healthFill.style.width = '100%';
                playerGroup.position.set(0, 0, 0);
                if(inVehicle) carGroup.position.set(0, 0, 0);
            }
        }
        
        // proximity check for vehicle
        function updateProximity() {
            const dist = playerGroup.position.distanceTo(carGroup.position);
            nearVehicle = (dist < 2.2 && !inVehicle);
        }
        
        let lastTime = performance.now();
        // animation loop
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastTime) / 1000);
            lastTime = now;
            if (delta <= 0) delta = 0.016;
            
            let speed = keyState.shift ? 9.0 : moveSpeed;
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.w) move.z -= 1;
            if (keyState.s) move.z += 1;
            if (keyState.a) move.x -= 1;
            if (keyState.d) move.x += 1;
            move.normalize();
            
            // camera direction movement (first person relative)
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            forward.y = 0;
            right.y = 0;
            forward.normalize();
            right.normalize();
            
            let moveDelta = new THREE.Vector3(0, 0, 0);
            moveDelta.addScaledVector(forward, move.z);
            moveDelta.addScaledVector(right, move.x);
            moveDelta.multiplyScalar(speed * delta);
            
            if (!inVehicle) {
                let newPos = playerGroup.position.clone().add(moveDelta);
                if (!checkCollision(newPos, 0.5)) {
                    playerGroup.position.copy(newPos);
                }
                // simple gravity
                if (playerGroup.position.y > 0.05) {
                    velocityY -= 15 * delta;
                    playerGroup.position.y += velocityY * delta;
                    if (playerGroup.position.y <= 0.05) {
                        playerGroup.position.y = 0.05;
                        velocityY = 0;
                        isGrounded = true;
                        if (keyState.space && isGrounded) { velocityY = 5.5; isGrounded = false; }
                    } else { isGrounded = false; }
                } else {
                    velocityY = 0;
                    isGrounded = true;
                    if (keyState.space) { velocityY = 5.5; isGrounded = false; }
                }
            } else {
                // vehicle control
                let carMove = new THREE.Vector3(move.x, 0, move.z);
                carMove.applyQuaternion(camera.quaternion);
                carMove.y = 0;
                carMove.multiplyScalar(speed * delta * 0.9);
                let newCarPos = vehicleObj.position.clone().add(carMove);
                if (!checkCollision(newCarPos, 0.9)) vehicleObj.position.copy(newCarPos);
            }
            
            // update camera position (first person + vehicle offset)
            if (!inVehicle) {
                camera.position.copy(playerGroup.position).add(cameraOffset);
            } else {
                camera.position.copy(vehicleObj.position).add(cameraOffset);
            }
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;
            
            // bullets update & collisions
            for (let i=0; i<bullets.length; i++) {
                const b = bullets[i];
                b.position.add(b.userData.vel.clone().multiplyScalar(delta));
                b.userData.life -= delta*40;
                if (b.userData.life <= 0 || b.position.y < -1 || Math.abs(b.position.x) > 40 || Math.abs(b.position.z) > 40) {
                    scene.remove(b);
                    bullets.splice(i,1);
                    i--;
                    continue;
                }
                // hit buildings or ground? simple remove after short distance
            }
            
            updateProximity();
            // animate car & player group visual rotation (just for fun)
            if (!inVehicle) {
                const angleToTarget = Math.atan2(move.x, move.z);
                if (move.length() > 0.1) playerGroup.rotation.y = angleToTarget;
            } else {
                const speedFactor = (keyState.w ? 1 : 0) - (keyState.s ? 1 : 0);
                if (Math.abs(speedFactor) > 0.1) vehicleObj.rotation.y = camera.rotation.y;
            }
            
            // random damage for atmosphere
            if (Math.random() < 0.005) takeDamage(0);
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        // simple start
        animate();
        
        // resize handler
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // ========== PART 2 ==========
// Advanced Features: Mission System, NPCs, Weapons, Enemy AI
        
        // --- MISSION SYSTEM ---
        let activeMission = null;
        let missionComplete = false;
        const missions = {
            mission1: {
                name: "🏁 First Contact",
                description: "Reach the marker at the central plaza",
                type: "reach",
                targetPos: new THREE.Vector3(8, 0.5, 6),
                completed: false,
                reward: 500
            },
            mission2: {
                name: "💥 Eliminate Targets",
                description: "Take down 3 enemy drones",
                type: "kill",
                targetCount: 3,
                currentKills: 0,
                completed: false,
                reward: 1000
            }
        };
        
        // mission marker (CSS2D)
        const missionMarkerDiv = document.createElement('div');
        missionMarkerDiv.textContent = '📍 MISSION';
        missionMarkerDiv.style.color = '#ffaa44';
        missionMarkerDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
        missionMarkerDiv.style.padding = '4px 12px';
        missionMarkerDiv.style.borderRadius = '20px';
        missionMarkerDiv.style.fontSize = '14px';
        missionMarkerDiv.style.fontWeight = 'bold';
        missionMarkerDiv.style.border = '1px solid #ffaa44';
        const missionMarker = new CSS2DObject(missionMarkerDiv);
        scene.add(missionMarker);
        
        function updateMissionMarker() {
            if (activeMission && activeMission.type === 'reach' && !activeMission.completed) {
                missionMarker.position.copy(activeMission.targetPos);
                missionMarker.visible = true;
            } else {
                missionMarker.visible = false;
            }
        }
        
        function startMission(missionId) {
            activeMission = missions[missionId];
            missionComplete = false;
            if (activeMission.type === 'kill') activeMission.currentKills = 0;
            showNotification(`📢 New Mission: ${activeMission.name}`, '#44ff88');
            updateMissionMarker();
        }
        
        function showNotification(msg, color = '#ffffff') {
            const notif = document.createElement('div');
            notif.textContent = msg;
            notif.style.position = 'absolute';
            notif.style.top = '80px';
            notif.style.right = '20px';
            notif.style.backgroundColor = `rgba(0,0,0,0.85)`;
            notif.style.color = color;
            notif.style.padding = '12px 24px';
            notif.style.borderRadius = '8px';
            notif.style.fontWeight = 'bold';
            notif.style.borderLeft = `4px solid ${color}`;
            notif.style.zIndex = '100';
            notif.style.fontFamily = 'monospace';
            notif.style.animation = 'fadeOut 3s forwards';
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        // add CSS animation
        const style = document.createElement('style');
        style.textContent = `@keyframes fadeOut { 0% { opacity: 1; transform: translateX(0); } 70% { opacity: 1; } 100% { opacity: 0; transform: translateX(50px); display: none; } }`;
        document.head.appendChild(style);
        
        // --- ENEMY NPCs (simple moving drones) ---
        const enemies = [];
        function createEnemy(x, z) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.3, 0.6), new THREE.MeshStandardMaterial({ color: 0xdd3333, emissive: 0x331100 }));
            body.castShadow = true;
            group.add(body);
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 }));
            eyeL.position.set(-0.2, 0.1, 0.32);
            const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000 }));
            eyeR.position.set(0.2, 0.1, 0.32);
            group.add(eyeL);
            group.add(eyeR);
            group.position.set(x, 0.2, z);
            scene.add(group);
            enemies.push({ mesh: group, health: 30, speed: 1.8, attackCooldown: 0 });
            return group;
        }
        
        // spawn some enemies around map
        createEnemy(6, 3);
        createEnemy(-4, -5);
        createEnemy(0, 9);
        createEnemy(-7, 2);
        
        // --- SIMPLE NPC (friendly) with floating text
        const npcDiv = document.createElement('div');
        npcDiv.textContent = '👤 Fixer 💬';
        npcDiv.style.backgroundColor = '#2266aa';
        npcDiv.style.padding = '5px 12px';
        npcDiv.style.borderRadius = '20px';
        npcDiv.style.fontSize = '12px';
        npcDiv.style.fontWeight = 'bold';
        npcDiv.style.border = '1px solid white';
        const npcLabel = new CSS2DObject(npcDiv);
        npcLabel.position.set(-3.5, 1.2, 5);
        scene.add(npcLabel);
        
        const npcModel = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.4, 1.2, 6), new THREE.MeshStandardMaterial({ color: 0x66cc99 }));
        npcModel.position.set(-3.5, 0.6, 5);
        npcModel.castShadow = true;
        scene.add(npcModel);
        
        let interactionDistance = 2.0;
        function checkNPCInteraction() {
            const playerPos = inVehicle ? vehicleObj.position : playerGroup.position;
            const dist = playerPos.distanceTo(npcModel.position);
            if (dist < interactionDistance && !activeMission) {
                showNotification("💬 Press [F] to talk to Fixer", "#aaffdd");
                if (window.keyF) {
                    startMission('mission1');
                    window.keyF = false;
                }
            }
        }
        
        // F key listener

function createVehicle(type, x, z, colorOverride = null) {
    const group = new THREE.Group();
    const vehicleData = vehicleTypes[type];
    const mainColor = colorOverride || vehicleData.color;
    
    // body
    let bodyGeo, bodyYOffset = 0.2;
    if (type === 'bike') {
        bodyGeo = new THREE.BoxGeometry(0.5, 0.3, 1.4);
        bodyYOffset = 0.25;
    } else if (type === 'truck') {
        bodyGeo = new THREE.BoxGeometry(1.0, 0.5, 2.0);
        bodyYOffset = 0.3;
    } else {
        bodyGeo = new THREE.BoxGeometry(0.9, 0.4, 1.6);
    }
    
    const bodyMat = new THREE.MeshStandardMaterial({ color: mainColor, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = bodyYOffset;
    body.castShadow = true;
    group.add(body);
    
    // wheels
    const wheelGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    let wheelPositions;
    if (type === 'bike') {
        wheelPositions = [[0, 0.15, -0.6], [0, 0.15, 0.6]];
    } else if (type === 'truck') {
        wheelPositions = [[-0.6, 0.2, -0.8], [0.6, 0.2, -0.8], [-0.6, 0.2, 0.8], [0.6, 0.2, 0.8]];
    } else {
        wheelPositions = [[-0.5, 0.15, -0.7], [0.5, 0.15, -0.7], [-0.5, 0.15, 0.7], [0.5, 0.15, 0.7]];
    }
    
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI/2;
        wheel.position.set(pos[0], pos[1], pos[2]);
        wheel.castShadow = true;
        group.add(wheel);
    });
    
    // roof/window for cars
    if (type === 'sports') {
        const roof = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.25, 1.0), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        roof.position.y = 0.55;
        roof.castShadow = true;
        group.add(roof);
    } else if (type === 'truck') {
        const cargo = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.6, 1.4), new THREE.MeshStandardMaterial({ color: 0x885522 }));
        cargo.position.y = 0.65;
        cargo.castShadow = true;
        group.add(cargo);
    }
    
    group.position.set(x, 0, z);
    group.userData = { type: type, speed: vehicleData.speed, handling: vehicleData.handling, color: mainColor };
    scene.add(group);
    
    return group;
}

class AdvancedEnemy {
    constructor(x, z) {
        this.group = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), new THREE.MeshStandardMaterial({ color: 0xdd4444, emissive: 0x441111 }));
        body.castShadow = true;
        this.group.add(body);
        const gun = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.4), new THREE.MeshStandardMaterial({ color: 0x666666 }));
        gun.position.set(0.3, 0.1, 0.3);
        this.group.add(gun);
        this.group.position.set(x, 0.3, z);
        scene.add(this.group);
        this.health = 45;
        this.speed = 1.5;
        this.shootCooldown = 0;
        this.range = 12;
    }
    
    update(delta, playerPos) {
        if (this.health <= 0) return false;
        const dist = this.group.position.distanceTo(playerPos);
        if (dist < this.range && dist > 2) {
            const dir = new THREE.Vector3().subVectors(playerPos, this.group.position).normalize();
            dir.y = 0;
            this.group.position.addScaledVector(dir, this.speed * delta);
        }
        this.group.lookAt(playerPos);
        
        if (dist < 10 && this.shootCooldown <= 0) {
            // enemy shoots back
            const bulletGeo = new THREE.SphereGeometry(0.1, 6, 6);
            const bulletMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff0000 });
            const bullet = new THREE.Mesh(bulletGeo, bulletMat);
            const dir = new THREE.Vector3().subVectors(playerPos, this.group.position).normalize();
            bullet.position.copy(this.group.position.clone().add(new THREE.Vector3(0, 0.3, 0)));
            bullet.userData = { vel: dir.multiplyScalar(18), life: 100, isEnemyBullet: true };
            scene.add(bullet);
            bullets.push(bullet);
            this.shootCooldown = 1.2;
            return true;
        }
        if (this.shootCooldown > 0) this.shootCooldown -= delta;
        return true;
    }
}

// --- HELICOPTER FLIGHT UPDATE ---
function updateHelicopter(delta) {
    if (!isFlying || !helicopter) return;
    const move = new THREE.Vector3(0, 0, 0);
    if (keyState.w) move.z -= 1;
    if (keyState.s) move.z += 1;
    if (keyState.a) move.x -= 1;
    if (keyState.d) move.x += 1;
    move.normalize();
    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
    forward.y = 0;
    right.y = 0;
    forward.normalize();
    right.normalize();
    let moveDelta = new THREE.Vector3(0, 0, 0);
    moveDelta.addScaledVector(forward, move.z);
    moveDelta.addScaledVector(right, move.x);
    moveDelta.multiplyScalar(helicopterSpeed * delta);
    helicopter.position.add(moveDelta);
    
    if (keyState.space) helicopterAltitude += 3 * delta;
    if (keyState.shift) helicopterAltitude -= 3 * delta;
    helicopterAltitude = Math.max(2, Math.min(20, helicopterAltitude));
    helicopter.position.y = helicopterAltitude;
    helicopter.rotation.y = camera.rotation.y;
    
    camera.position.copy(helicopter.position.clone().add(new THREE.Vector3(0, 2, 4)));
    camera.lookAt(helicopter.position);
    
    // rotor animation
    if (helicopter.userData.rotors) {
        helicopter.userData.rotors.forEach(rotor => {
            rotor.rotation.z += delta * 20;
        });
    }
}

function initMultiplayer(serverUrl = 'ws://localhost:8080') {
    try {
        socket = new WebSocket(serverUrl);
        socket.onopen = () => {
            multiplayerEnabled = true;
            document.getElementById('mpStatus').innerHTML = '<span style="color:#88ff88">CONNECTED</span>';
            showNotification("🌐 Multiplayer Connected! Other players will appear.", "#88ff88");

            socket.send(JSON.stringify({
                type: 'join',
                name: 'Player_' + Math.floor(Math.random() * 1000),
                pos: playerGroup.position.toArray()
            }));
        };
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'players') {
                updateOtherPlayers(data.players);
                document.getElementById('playerCount').innerText = Object.keys(data.players).length;
            } else if (data.type === 'move') {
                updateOtherPlayerPosition(data.id, data.pos);
            }
        };
        socket.onclose = () => {
            multiplayerEnabled = false;
            document.getElementById('mpStatus').innerHTML = '<span style="#ff8888">OFFLINE</span>';
        };
    } catch(e) {
        console.log("Multiplayer not available - running single player mode");

const originalBulletUpdate = (delta) => {
    for (let i=0; i<bullets.length; i++) {
        const b = bullets[i];
        b.position.add(b.userData.vel.clone().multiplyScalar(delta));
        b.userData.life -= delta*60;
        if (b.userData.life <= 0 || b.position.y < -1 || Math.abs(b.position.x) > 45 || Math.abs(b.position.z) > 45) {
            scene.remove(b);
            bullets.splice(i,1);
            i--;
            continue;
        }
        // enemy collision with damage
        for (let ei=0; ei<enemies.length; ei++) {
            const e = enemies[ei];
            if (e.mesh && b.position.distanceTo(e.mesh.position) < 0.7) {
                e.health -= (b.userData.damage || 25);
                scene.remove(b);
                bullets.splice(i,1);
                if (e.health <= 0) {
                    scene.remove(e.mesh);
                    enemies.splice(ei,1);
                    playerMoney += 100;
                    updateMoneyDisplay();
                    showNotification("💀 Enemy eliminated! +$100", "#88ff88");
                    if (activeStoryline && activeStoryline.type === 'kill') {
                        activeStoryline.current++;
                        if (activeStoryline.current >= activeStoryline.target) completeStoryMission();
                    }
                }
                i--;
                break;
            }
        }
        // boss damage
        if (bossEnemy && bossFightActive && b.position.distanceTo(bossEnemy.position) < 1.2) {
            bossEnemy.userData.health -= (b.userData.damage || 25);
            showNotification(`💥 Boss HP: ${bossEnemy.userData.health}/${bossEnemy.userData.maxHealth}`, "#ff6666");
            scene.remove(b);
            bullets.splice(i,1);
            if (bossEnemy.userData.health <= 0) {
                scene.remove(bossEnemy);
                bossFightActive = false;
                completeStoryMission();
            }
            i--;
        }
    }
};

let lastCycleTime = 0;
function fullLoop() {
    const now = performance.now();
    let delta = Math.min(0.033, (now - lastCycleTime) / 1000);
    lastCycleTime = now;
    if (delta < 0.01) delta = 0.016;
    
    updateDayNight(delta);
    originalBulletUpdate(delta);
    sendMultiplayerUpdate();
    checkStorylineProgress();
    
    requestAnimationFrame(fullLoop);
}
