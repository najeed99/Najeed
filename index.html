<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dual Puzzle · Memory Match + Sliding Puzzle</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            width: 100%;
            max-width: 600px;
        }

        .tab-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
        }

        .tab {
            background: #1e3a4d;
            border: none;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #cdebf9;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .tab.active {
            background: #f5b042;
            color: #1e2f3a;
            box-shadow: 0 0 15px #ffcd7e;
        }

        .game-panel {
            display: none;
        }

        .game-panel.active {
            display: block;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a1a24cc;
            padding: 10px 20px;
            border-radius: 50px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .stat-box {
            display: flex;
            gap: 10px;
            align-items: baseline;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #9bc2e0;
            text-transform: uppercase;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffefc0;
            font-family: monospace;
        }

        button {
            background: #f5b042;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.07s linear;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.96);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #0a1822;
            padding: 18px;
            border-radius: 48px;
        }

        .card {
            aspect-ratio: 1;
            perspective: 500px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.25s ease;
            transform-style: preserve-3d;
            border-radius: 20px;
            box-shadow: 0 8px 14px rgba(0,0,0,0.3);
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
        }

        .card-front {
            background: radial-gradient(circle at 30% 30%, #f7e6b0, #f0c674);
            transform: rotateY(180deg);
        }

        .card-back {
            background: linear-gradient(145deg, #2c7a9e, #1a4b63);
            font-size: 2.2rem;
            color: #ffe6aa;
        }

        .card.matched {
            filter: drop-shadow(0 0 6px #7effb3);
            cursor: default;
        }

        .slide-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            background: #0a1822;
            padding: 18px;
            border-radius: 48px;
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(145deg, #2c7a9e, #1a4b63);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #ffefc0;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: 0 6px 0 #0e3342;
        }

        .tile.empty {
            background: #1a4b63;
            box-shadow: inset 0 0 0 2px #5aa9c9;
            cursor: default;
            color: #5aa9c9;
        }

        .tile:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #0e3342;
        }

        .message {
            margin-top: 20px;
            text-align: center;
            background: #0a1a24cc;
            padding: 10px;
            border-radius: 50px;
            font-weight: bold;
            color: #e6f7ff;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 18px;
            color: #8db3cc;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="tab-bar">
        <button class="tab active" data-game="memory">🧠 MEMORY MATCH</button>
        <button class="tab" data-game="slide">🔀 SLIDING PUZZLE</button>
    </div>

    <!-- Memory Game Panel -->
    <div id="memoryPanel" class="game-panel active">
        <div class="stats">
            <div class="stat-box"><span class="stat-label">MOVES</span><span class="stat-value" id="memMoves">0</span></div>
            <div class="stat-box"><span class="stat-label">PAIRS</span><span class="stat-value" id="memPairs">0</span><span class="stat-label">/8</span></div>
            <button id="resetMemoryBtn">🔄 NEW GAME</button>
        </div>
        <div id="memoryGrid" class="memory-grid"></div>
        <div id="memMessage" class="message">✨ Flip cards and match the pairs! ✨</div>
        <footer>🐠 Mismatch plays: "tui bolod naki?" 🎤</footer>
    </div>

    <!-- Sliding Puzzle Panel -->
    <div id="slidePanel" class="game-panel">
        <div class="stats">
            <div class="stat-box"><span class="stat-label">MOVES</span><span class="stat-value" id="slideMoves">0</span></div>
            <div></div>
            <button id="resetSlideBtn">🔀 SHUFFLE</button>
        </div>
        <div id="slideGrid" class="slide-grid"></div>
        <div id="slideMessage" class="message">⬅️ Tap a tile next to the empty space</div>
        <footer>🌟 3x3 Sliding Puzzle · Arrange 1-8 in order</footer>
    </div>
</div>

<script>
    // ========== MEMORY MATCH GAME ==========
    const icons = ["🐠", "🐟", "🐙", "🦑", "🐬", "🐳", "🐚", "🌟"];
    let memCards = [];
    let memMoves = 0;
    let memPairs = 0;
    let lockMem = false;
    let firstCard = null;
    let secondCard = null;
    let flipTimer = null;

    const memGrid = document.getElementById('memoryGrid');
    const memMovesSpan = document.getElementById('memMoves');
    const memPairsSpan = document.getElementById('memPairs');
    const memMessage = document.getElementById('memMessage');
    const resetMem = document.getElementById('resetMemoryBtn');

    // Sound effect: "tui bolod naki?" using Google TTS
    function playMismatchSound() {
        if (!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("tui bolod naki?");
        utterance.lang = "bn-BD";
        utterance.rate = 0.95;
        utterance.pitch = 1.2;
        // Try to use a Google voice if available
        const setVoice = () => {
            const voices = window.speechSynthesis.getVoices();
            const googleVoice = voices.find(v => v.name.includes('Google') && (v.lang.includes('bn') || v.lang.includes('en')));
            if (googleVoice) utterance.voice = googleVoice;
        };
        if (window.speechSynthesis.getVoices().length) setVoice();
        else window.speechSynthesis.onvoiceschanged = setVoice;
        window.speechSynthesis.speak(utterance);
    }

    function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function initMemory() {
        if (flipTimer) clearTimeout(flipTimer);
        let deck = [];
        for (let i = 0; i < 8; i++) {
            deck.push({ icon: icons[i], matched: false, flipped: false });
            deck.push({ icon: icons[i], matched: false, flipped: false });
        }
        deck = shuffle(deck);
        memCards = deck.map((c, idx) => ({ id: idx, ...c }));
        memMoves = 0;
        memPairs = 0;
        firstCard = null;
        secondCard = null;
        lockMem = false;
        memMovesSpan.innerText = memMoves;
        memPairsSpan.innerText = memPairs;
        memMessage.innerHTML = "🎴 New game! Find all pairs 🎴";
        memMessage.style.background = "#0a1a24cc";
        renderMemory();
    }

    function renderMemory() {
        memGrid.innerHTML = '';
        memCards.forEach((card, idx) => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            if (card.flipped || card.matched) cardDiv.classList.add('flipped');
            if (card.matched) cardDiv.classList.add('matched');
            
            const inner = document.createElement('div');
            inner.className = 'card-inner';
            
            const front = document.createElement('div');
            front.className = 'card-front';
            front.innerText = card.icon;
            
            const back = document.createElement('div');
            back.className = 'card-back';
            back.innerText = '?';
            
            inner.appendChild(front);
            inner.appendChild(back);
            cardDiv.appendChild(inner);
            
            cardDiv.addEventListener('click', () => {
                if (lockMem) return;
                if (card.matched || card.flipped) return;
                handleMemoryClick(idx);
            });
            memGrid.appendChild(cardDiv);
        });
    }

    function handleMemoryClick(idx) {
        if (lockMem) return;
        if (memCards[idx].matched || memCards[idx].flipped) return;
        
        if (firstCard === null) {
            memCards[idx].flipped = true;
            firstCard = idx;
            renderMemory();
            return;
        }
        
        if (firstCard !== null && secondCard === null && firstCard !== idx) {
            memCards[idx].flipped = true;
            secondCard = idx;
            memMoves++;
            memMovesSpan.innerText = memMoves;
            renderMemory();
            
            const card1 = memCards[firstCard];
            const card2 = memCards[idx];
            
            if (card1.icon === card2.icon) {
                // MATCH!
                card1.matched = true;
                card2.matched = true;
                memPairs++;
                memPairsSpan.innerText = memPairs;
                firstCard = null;
                secondCard = null;
                renderMemory();
                
                if (memPairs === 8) {
                    memMessage.innerHTML = "🎉 VICTORY! PERFECT MEMORY! 🎉";
                    memMessage.style.background = "#f5b042aa";
                    lockMem = true;
                    createConfetti();
                } else {
                    memMessage.innerHTML = "✅ Nice match! ✅";
                    setTimeout(() => {
                        if (memPairs !== 8) memMessage.innerHTML = "✨ Keep going! ✨";
                    }, 800);
                }
            } else {
                // MISMATCH - PLAY THE SOUND!
                playMismatchSound();
                lockMem = true;
                memMessage.innerHTML = "❌ Mismatch! 'tui bolod naki?' ❌";
                memMessage.style.background = "#8b3020aa";
                
                flipTimer = setTimeout(() => {
                    memCards[firstCard].flipped = false;
                    memCards[secondCard].flipped = false;
                    firstCard = null;
                    secondCard = null;
                    lockMem = false;
                    renderMemory();
                    if (memPairs !== 8) {
                        memMessage.innerHTML = "✨ Flip and match the icons ✨";
                        memMessage.style.background = "#0a1a24cc";
                    }
                    flipTimer = null;
                }, 700);
                renderMemory();
            }
        }
    }

    // ========== SLIDING PUZZLE GAME ==========
    let slideTiles = [];
    let slideMoves = 0;
    let slideSolved = false;
    const slideGrid = document.getElementById('slideGrid');
    const slideMovesSpan = document.getElementById('slideMoves');
    const slideMessage = document.getElementById('slideMessage');
    const resetSlide = document.getElementById('resetSlideBtn');

    function isSolvable(tiles) {
        let inversions = 0;
        const flat = tiles.filter(v => v !== 0);
        for (let i = 0; i < flat.length; i++) {
            for (let j = i + 1; j < flat.length; j++) {
                if (flat[i] > flat[j]) inversions++;
            }
        }
        return inversions % 2 === 0;
    }

    function initSlide() {
        let arr = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        do {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
        } while (!isSolvable(arr));
        slideTiles = [...arr];
        slideMoves = 0;
        slideSolved = false;
        slideMovesSpan.innerText = slideMoves;
        slideMessage.innerHTML = "⬅️ Tap tile next to empty space to slide";
        slideMessage.style.background = "#0a1a24cc";
        renderSlide();
    }

    function renderSlide() {
        slideGrid.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const val = slideTiles[i];
            const tile = document.createElement('div');
            tile.className = 'tile';
            if (val === 0) {
                tile.classList.add('empty');
                tile.innerText = '★';
            } else {
                tile.innerText = val;
            }
            tile.addEventListener('click', () => handleSlideClick(i));
            slideGrid.appendChild(tile);
        }
        
        if (checkWin() && !slideSolved) {
            slideSolved = true;
            slideMessage.innerHTML = "🎉 SLIDING PUZZLE SOLVED! 🎉";
            slideMessage.style.background = "#f5b042aa";
            createConfetti();
        }
    }

    function handleSlideClick(idx) {
        if (slideSolved) return;
        const emptyIdx = slideTiles.indexOf(0);
        const emptyRow = Math.floor(emptyIdx / 3);
        const emptyCol = emptyIdx % 3;
        const tileRow = Math.floor(idx / 3);
        const tileCol = idx % 3;
        const isAdjacent = (Math.abs(emptyRow - tileRow) + Math.abs(emptyCol - tileCol)) === 1;
        
        if (isAdjacent) {
            [slideTiles[emptyIdx], slideTiles[idx]] = [slideTiles[idx], slideTiles[emptyIdx]];
            slideMoves++;
            slideMovesSpan.innerText = slideMoves;
            renderSlide();
        } else {
            slideMessage.innerHTML = "🚫 Only tiles next to empty space can move!";
            setTimeout(() => {
                if (!slideSolved) slideMessage.innerHTML = "⬅️ Tap tile next to empty space to slide";
            }, 800);
        }
    }

    function checkWin() {
        for (let i = 0; i < 8; i++) {
            if (slideTiles[i] !== i + 1) return false;
        }
        return slideTiles[8] === 0;
    }

    // ========== CONFETTI EFFECT ==========
    function createConfetti() {
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '1000';
        document.body.appendChild(canvas);
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const particles = [];
        const colors = ['#f5bc70', '#f5a97f', '#f4c542', '#a7d489', '#7dc4e8', '#e9692c'];
        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                size: Math.random() * 7 + 3,
                color: colors[Math.floor(Math.random() * colors.length)],
                speedY: Math.random() * 6 + 4,
                speedX: (Math.random() - 0.5) * 3,
                rotation: Math.random() * 360,
            });
        }
        
        let animId;
        const start = performance.now();
        function draw(now) {
            if (now - start > 2000) {
                cancelAnimationFrame(animId);
                canvas.remove();
                return;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                ctx.restore();
                p.x += p.speedX;
                p.y += p.speedY;
                p.rotation += 8;
                if (p.y > canvas.height + 50) p.y = -50;
                if (p.x < -50) p.x = canvas.width + 30;
                if (p.x > canvas.width + 50) p.x = -30;
            }
            animId = requestAnimationFrame(draw);
        }
        animId = requestAnimationFrame(draw);
        setTimeout(() => {
            if (animId) cancelAnimationFrame(animId);
            if (canvas.remove) canvas.remove();
        }, 2100);
    }

    // ========== TAB SWITCHING ==========
    const tabs = document.querySelectorAll('.tab');
    const memoryPanel = document.getElementById('memoryPanel');
    const slidePanel = document.getElementById('slidePanel');
    
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const game = tab.dataset.game;
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            if (game === 'memory') {
                memoryPanel.classList.add('active');
                slidePanel.classList.remove('active');
            } else {
                memoryPanel.classList.remove('active');
                slidePanel.classList.add('active');
                if (!slideTiles.length) initSlide();
            }
        });
    });
    
    resetMem.addEventListener('click', () => initMemory());
    resetSlide.addEventListener('click', () => initSlide());
    
    // Start both games
    initMemory();
    initSlide();
</script>
</body>
</html>
