<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Echoes of the Lost Keep | Interactive Story Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Cinema', 'Georgia', 'Times New Roman', serif;
            padding: 1.5rem;
        }

        /* Main game container */
        .game-container {
            max-width: 800px;
            width: 100%;
            background: rgba(22, 28, 40, 0.85);
            backdrop-filter: blur(2px);
            border-radius: 2.5rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(210, 180, 140, 0.3);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* Header / atmosphere */
        .game-header {
            background: #1e2a2e;
            padding: 1rem 1.5rem;
            border-bottom: 2px solid #cdb084;
            text-align: center;
        }

        .game-header h1 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            color: #f7e5c2;
            text-shadow: 0 2px 5px #00000040;
            font-weight: 600;
            word-break: keep-all;
        }

        .game-header p {
            font-size: 0.8rem;
            color: #b9c7c9;
            font-family: monospace;
            margin-top: 0.3rem;
        }

        /* Story panel */
        .story-panel {
            padding: 2rem 1.8rem;
            background: #0f121bcc;
            min-height: 320px;
            border-bottom: 1px solid #2c3542;
        }

        .story-text {
            font-size: 1.25rem;
            line-height: 1.5;
            color: #ece4d7;
            text-shadow: 0 1px 1px black;
            font-weight: 500;
            margin-bottom: 1.8rem;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .story-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #a6b3bc;
            border-top: 1px dashed #2e3a48;
            padding-top: 0.8rem;
            margin-top: 0.5rem;
        }

        /* Choices area */
        .choices-area {
            padding: 1.2rem 1.8rem 1.8rem;
            background: #0b0f17;
        }

        .choices-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #c5b18b;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .choices-buttons {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .choice-btn {
            background: #1e2936;
            border: 1px solid #4b5568;
            color: #f3edd8;
            padding: 0.85rem 1.2rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: left;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .choice-btn:hover {
            background: #2d3b4b;
            border-color: #cdb084;
            transform: translateX(8px);
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .choice-btn:active {
            transform: scale(0.98);
        }

        /* Action bar (restart / stats) */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.9rem 1.8rem;
            background: #070b10;
            border-top: 1px solid #282f3a;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .restart-btn {
            background: #3c2a2a;
            border: none;
            color: #f0cfb0;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .restart-btn:hover {
            background: #5e3f3f;
            color: #ffefcf;
            transform: scale(1.02);
        }

        .stats {
            font-size: 0.8rem;
            color: #aead9a;
            background: #1e222d60;
            padding: 0.3rem 0.9rem;
            border-radius: 28px;
            font-family: monospace;
        }

        /* subtle footer */
        .game-footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 0.8rem;
            color: #5f6c7a;
            border-top: 1px solid #1e2530;
        }

        @media (max-width: 550px) {
            .story-panel {
                padding: 1.5rem;
            }
            .story-text {
                font-size: 1rem;
            }
            .choice-btn {
                padding: 0.7rem 1rem;
                font-size: 0.9rem;
            }
            .game-header h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container" id="gameRoot">
    <div class="game-header">
        <h1>⚔️ ECHOES OF THE LOST KEEP ⚔️</h1>
        <p>✦ a branching tale of fate, courage & shadow ✦</p>
    </div>
    <div class="story-panel" id="storyPanel">
        <div class="story-text" id="storyText">
            Loading the ancient scroll...
        </div>
        <div class="story-meta">
            <span>📜 Chapter of Whispers</span>
            <span>🎭 your choices shape destiny</span>
        </div>
    </div>
    <div class="choices-area" id="choicesArea">
        <div class="choices-title">⟡ what will you do? ⟡</div>
        <div class="choices-buttons" id="choicesContainer">
            <!-- dynamic choices injected here -->
        </div>
    </div>
    <div class="action-bar">
        <button class="restart-btn" id="restartGameBtn">⟳ restart journey</button>
        <div class="stats" id="statsDisplay">⚔️ valor: 0  |  🜁 shadow: 0</div>
    </div>
    <div class="game-footer">
        ✦ each decision weaves the legend — multiple endings await ✦
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // STORY DATABASE: NODES WITH CHOICES, OUTCOMES, STATS IMPACT
    // --------------------------------------------------------------
    // The game keeps two main stats: Valor (courage/honor) & Shadow (mystic/dark cunning)
    // Many endings will depend on these thresholds
    
    const STATS = {
        VALOR: 'valor',
        SHADOW: 'shadow'
    };
    
    // ---- Story nodes definitions ----
    const storyGraph = {
        // INTRO - node 0
        start: {
            id: 'start',
            title: 'The Forgotten Road',
            text: "You stand at the crumbling edge of the Whispering Woods. Before you lies the path to the Lost Keep, where King Aldric's spirit is said to linger. An old hermit offers you two tokens: a silver talon (courage) or a raven's feather (cunning). The heavy mist coils like a living thing.\n\n'Choose wisely, wanderer,' the hermit whispers. 'Your soul's echo will decide the Keep's fate...'",
            choices: [
                { text: "🛡️ Take the Silver Talon — embrace honor & valor", nextNode: "crossroads_valor", stats: { valor: +2, shadow: 0 } },
                { text: "🌑 Accept the Raven's Feather — rely on shadows & subtlety", nextNode: "crossroads_shadow", stats: { valor: 0, shadow: +2 } },
                { text: "❓ Reject both — walk your own raw path", nextNode: "raw_path", stats: { valor: +1, shadow: +1 } }
            ]
        },
        // VALOR PATH START
        crossroads_valor: {
            id: 'crossroads_valor',
            text: "Clutching the silver talon, you feel warmth in your chest. You stride into the ancient grove. A wounded griffin blocks the way, gasping for breath. It speaks in a low rumble: 'Heal me, and I shall guide you. Or leave me, and take the faster but treacherous mountain pass.'",
            choices: [
                { text: "✨ Heal the noble griffin — risk delay but gain a powerful ally", nextNode: "griffin_ally", stats: { valor: +3, shadow: -1 } },
                { text: "⛰️ Abandon the beast — take the mountain pass with haste", nextNode: "mountain_pass_valor", stats: { valor: -1, shadow: +1 } }
            ]
        },
        griffin_ally: {
            id: 'griffin_ally',
            text: "You share your water and herbs, mending the griffin's wing. Grateful, it bows low. 'I am Skyshadow. The Keep's curse feeds on solitude. Come, I will carry you over the Thornwall.' Together you soar above the cursed pines. You land before an ancient door carved with runes of loyalty.",
            choices: [
                { text: "🏰 Enter the door with Skyshadow beside you — united front", nextNode: "hall_of_oaths", stats: { valor: +2, shadow: 0 } },
                { text: "🗝️ Whisper a thank you but send the griffin away — enter alone", nextNode: "alone_hall", stats: { valor: -1, shadow: +2 } }
            ]
        },
        mountain_pass_valor: {
            id: 'mountain_pass_valor',
            text: "You rush through the treacherous mountain pass. Rocks crumble behind you. You find an abandoned watchtower with a strange ghostly bell. Ringing it summons visions of past knights. They offer you a cursed blade that grants might but whispers temptations.",
            choices: [
                { text: "⚔️ Take the Cursed Blade — power at a price", nextNode: "cursed_blade_path", stats: { valor: -2, shadow: +3 } },
                { text: "🔔 Refuse and pray to the old gods for guidance", nextNode: "prayer_clearing", stats: { valor: +2, shadow: -1 } }
            ]
        },
        cursed_blade_path: {
            id: 'cursed_blade_path',
            text: "The blade hums with dark promises. You cut through the shadow-wardens with ease, but each victory stains your spirit. You reach the Keep's throne room, where a reflection of yourself snarls. The Keep offers a bargain: become its eternal guardian or shatter the blade.",
            choices: [
                { text: "💔 Shatter the blade at the last moment — redeem yourself", nextNode: "ending_redemption", stats: { valor: +4, shadow: -3 } },
                { text: "👑 Accept the dark bargain — rule the Keep as a shadow tyrant", nextNode: "ending_shadow_tyrant", stats: { valor: -5, shadow: +5 } }
            ]
        },
        prayer_clearing: {
            id: 'prayer_clearing',
            text: "Kneeling in mossy ruins, a celestial light blinds you. An ethereal stag appears. 'True courage is mercy.' It marks your brow with starlight. The Lost Keep's doors swing open before you, and the inner sanctum holds the Crown of Oaths.",
            choices: [
                { text: "👑 Take the Crown of Oaths and restore the kingdom", nextNode: "ending_true_king", stats: { valor: +5, shadow: -2 } },
                { text: "🕯️ Lay the crown on the altar and leave — a humble legend", nextNode: "ending_humble_legend", stats: { valor: +3, shadow: 0 } }
            ]
        },
        hall_of_oaths: {
            id: 'hall_of_oaths',
            text: "Skyshadow's presence fills the hall with primal light. Fallen knights rise as spirits, and they recognize your companion. 'One who heals earns the right to challenge the Eclipse Warden.' The final test: answer a riddle of sacrifice or combat.",
            choices: [
                { text: "🧠 Answer the riddle of sacrifice — wisdom over violence", nextNode: "wisdom_end", stats: { valor: +2, shadow: +1 } },
                { text: "⚔️ Challenge the Warden to single combat", nextNode: "combat_glory", stats: { valor: +3, shadow: -1 } }
            ]
        },
        wisdom_end: {
            id: 'wisdom_end',
            text: "You recite the ancient triad: 'Duty without heart is a cage, power without wisdom is ruin, love without courage is hollow.' The Eclipse Warden dissolves into light. The Lost Keep becomes a sanctuary for all lost souls. Bards sing of your clever mercy for centuries.",
            choices: [] // ending
        },
        combat_glory: {
            id: 'combat_glory',
            text: "You face the Warden in a storm of steel and honor. Skyshadow lends you swiftness. After a grueling fight, you pierce its shadow core. The curse breaks, but you fall with a mortal wound. Yet the people build a statue in the great square — the hero who gave everything.",
            choices: [] // ending
        },
        alone_hall: {
            id: 'alone_hall',
            text: "You dismiss Skyshadow — inside the hall, solitude gnaws at your mind. A phantom offers you a mirror: see what you truly desire. Power, love, or oblivion?",
            choices: [
                { text: "🔮 Gaze into power — become lord of echoes", nextNode: "ending_lord_echoes", stats: { valor: -3, shadow: +4 } },
                { text: "💔 Shatter the mirror — choose oblivion and wander forever", nextNode: "ending_wanderer", stats: { valor: 0, shadow: 0 } }
            ]
        },
        // SHADOW PATH START
        crossroads_shadow: {
            id: 'crossroads_shadow',
            text: "The Raven's Feather grows cold in your palm. You take the forgotten tunnels beneath the mountain. Whispers guide you to a coven of shadow-weavers. They offer you a ritual to 'unveil the Keep's heart', but it requires a sacrifice of a memory.",
            choices: [
                { text: "🎭 Perform the ritual — sacrifice a precious memory", nextNode: "shadow_ritual", stats: { shadow: +3, valor: -1 } },
                { text: "🌿 Refuse the ritual and seek the hidden entrance yourself", nextNode: "sneak_entrance", stats: { shadow: +1, valor: +1 } }
            ]
        },
        shadow_ritual: {
            id: 'shadow_ritual',
            text: "The shadows accept your memory of childhood warmth. You gain sight beyond sight. You walk through walls into the Keep's heart, where a cursed mirror shows the future: either you bind the darkness or it consumes you.",
            choices: [
                { text: "🪞 Bind the darkness into the Raven's Feather — become a wise dusk-bringer", nextNode: "ending_dusk_bringer", stats: { shadow: +2, valor: +2 } },
                { text: "🌀 Let darkness consume you — become the new Nightmare King", nextNode: "ending_nightmare_king", stats: { shadow: +6, valor: -4 } }
            ]
        },
        sneak_entrance: {
            id: 'sneak_entrance',
            text: "You slip through a crumbling lattice. Inside, you find the original wardstone of the Keep. It is cracked. You can either repair it using thieved magical essence or shatter it to unleash chaotic freedom.",
            choices: [
                { text: "🔧 Repair the wardstone — steady balance", nextNode: "ending_balance", stats: { valor: +2, shadow: +1 } },
                { text: "💥 Shatter the stone — total anarchy, but you rule the ruins", nextNode: "ending_anarchy", stats: { shadow: +5, valor: -2 } }
            ]
        },
        // RAW PATH (reject both tokens)
        raw_path: {
            id: 'raw_path',
            text: "Without token, the forest treats you as neither prey nor guest. You wander until you find a hidden druidic circle. An ancient tree speaks: 'One who refuses gifts might still be worthy. Choose: become the Grove Guardian or seek the Keep through the sunless bog.'",
            choices: [
                { text: "🌳 Become Grove Guardian — protect nature, abandon the Keep", nextNode: "ending_grove_guardian", stats: { valor: +3, shadow: +1 } },
                { text: "🏞️ Push through the bog toward the Keep", nextNode: "bog_journey", stats: { valor: +1, shadow: +2 } }
            ]
        },
        bog_journey: {
            id: 'bog_journey',
            text: "The bog tests your endurance. Ghost lights lure you, but you resist. You find a hidden crypt with three relics: a warrior's helm, a rogue's cloak, a priest's censer. Choose your aspect.",
            choices: [
                { text: "⛑️ Warrior's Helm — face the curse head-on", nextNode: "warrior_ending", stats: { valor: +3, shadow: 0 } },
                { text: "🥷 Rogue's Cloak — infiltrate and disable the curse", nextNode: "rogue_ending", stats: { shadow: +3, valor: 0 } },
                { text: "🕯️ Priest's Censer — try to exorcise the sorrow", nextNode: "priest_ending", stats: { valor: +2, shadow: +1 } }
            ]
        },
        warrior_ending: {
            id: 'warrior_ending',
            text: "You smash through the cursed wards with brute force. The Keep's spirit respects your tenacity and lifts the gloom, naming you Warden of the Marches. The land heals under your stern but just rule.",
            choices: []
        },
        rogue_ending: {
            id: 'rogue_ending',
            text: "Under cover of shadows, you sabotage the main hex crystal. The curse evaporates silently. No one knows your name, but the common folk speak of a 'phantom savior.' You steal a legendary gem and live free.",
            choices: []
        },
        priest_ending: {
            id: 'priest_ending',
            text: "You chant old hymns and release each sorrow trapped within the walls. The spirits weep with gratitude. The Lost Keep becomes a peaceful sanctuary, and you become the first of the Silent Order.",
            choices: []
        },
        // Specific endings from previous continuations:
        ending_redemption: {
            id: 'ending_redemption',
            text: "With a final cry, you shatter the cursed blade. The explosion of light cleanses the throne room. King Aldric's ghost thanks you, placing a laurel on your head. You become the legendary Redeemer, and the Lost Keep is renamed Fort Hope. ✨ GLORIOUS REDEMPTION END ✨",
            choices: []
        },
        ending_shadow_tyrant: {
            id: 'ending_shadow_tyrant',
            text: "You accept the dark bargain. The Lost Keep becomes a fortress of eternal twilight. You rule with an iron fist masked by shadows. None dare enter your realm. ⚫ SHADOW TYRANT ENDING ⚫",
            choices: []
        },
        ending_true_king: {
            id: 'ending_true_king',
            text: "The Crown of Oaths blazes as you place it upon your brow. Every fallen knight rises to bow. Peace sweeps across the land for a thousand years. 👑 TRUE KING ENDING — the golden age begins 👑",
            choices: []
        },
        ending_humble_legend: {
            id: 'ending_humble_legend',
            text: "You leave the crown untouched, walking away into the sunrise. Villages tell tales of the 'nameless one' who saved the Keep without desire for reward. 🍃 THE HUMBLE LEGEND — eternal in spirit 🍃",
            choices: []
        },
        ending_lord_echoes: {
            id: 'ending_lord_echoes',
            text: "You become the Lord of Echoes, commanding ghostly legions. The mortal world knows you as a myth — neither good nor evil, just eternal. 🏛️ LORD OF ECHOES END 🏛️",
            choices: []
        },
        ending_wanderer: {
            id: 'ending_wanderer',
            text: "You shatter the mirror, and reality dissolves. You wander as a translucent shade between worlds, forever searching for a home you'll never find. 🌫️ THE ETERNAL WANDERER 🌫️",
            choices: []
        },
        ending_dusk_bringer: {
            id: 'ending_dusk_bringer',
            text: "You bind the darkness into the Raven's Feather. Now you walk between dusk and dawn, healing cursed places. Whispers call you the Dusk Bringer — a legend of twilight salvation. 🌄 DUSK BRINGER ENDING 🌄",
            choices: []
        },
        ending_nightmare_king: {
            id: 'ending_nightmare_king',
            text: "The darkness consumes all. You become the Nightmare King, turning the Keep into a realm of terror. Even your memory brings fear. 💀 NIGHTMARE KING — an age of dread 💀",
            choices: []
        },
        ending_balance: {
            id: 'ending_balance',
            text: "You repair the wardstone with equal parts valor and subtle craft. The Keep stabilizes as a neutral ground. You become a mythic arbiter — the Scale Warden. ⚖️ ENDING OF PERFECT BALANCE ⚖️",
            choices: []
        },
        ending_anarchy: {
            id: 'ending_anarchy',
            text: "The stone shatters, releasing raw chaos. The Keep crumbles but you survive, a warlord of the wild magic zone. Freedom without laws — chaotic and glorious. 🔥 ANARCHY REIGN 🔥",
            choices: []
        },
        ending_grove_guardian: {
            id: 'ending_grove_guardian',
            text: "You merge with the ancient tree and protect the wilds forever. The Lost Keep is forgotten, but the forest thrives under your gentle watch. 🌳 GROVE GUARDIAN — eternal nature 🌳",
            choices: []
        }
    };
    
    // Helper to get node if exists, else fallback
    function getNode(nodeId) {
        return storyGraph[nodeId] || storyGraph.start;
    }
    
    // Game state
    let currentNodeId = "start";
    let currentStats = { valor: 0, shadow: 0 };
    
    // DOM elements
    const storyTextEl = document.getElementById('storyText');
    const choicesContainer = document.getElementById('choicesContainer');
    const statsDisplay = document.getElementById('statsDisplay');
    const restartBtn = document.getElementById('restartGameBtn');
    
    // Update stats UI
    function updateStatsUI() {
        statsDisplay.innerText = `⚔️ valor: ${currentStats.valor}  |  🜁 shadow: ${currentStats.shadow}`;
    }
    
    // Apply stat modifications from choice
    function applyStatMods(mods) {
        if (mods.valor) currentStats.valor += mods.valor;
        if (mods.shadow) currentStats.shadow += mods.shadow;
        // clamp to avoid insane numbers, but just for display
        if (currentStats.valor < -10) currentStats.valor = -10;
        if (currentStats.shadow < -10) currentStats.shadow = -10;
        updateStatsUI();
    }
    
    // Render current node & choices (ending detection)
    function renderGame() {
        const node = getNode(currentNodeId);
        if (!node) {
            // fallback
            storyTextEl.innerText = "The threads of fate have vanished... Restart the journey.";
            choicesContainer.innerHTML = `<button class="choice-btn" id="emergencyRestart">⟳ Begin anew</button>`;
            document.getElementById('emergencyRestart')?.addEventListener('click', () => restartGame());
            return;
        }
        
        // show story text with a small flavor: include stats if ending? not needed
        let displayText = node.text;
        // if node has no choices, it's an ending: add small footer line
        if (!node.choices || node.choices.length === 0) {
            displayText += "\n\n✦ THE END — your legend is carved into time ✦";
        }
        storyTextEl.innerText = displayText;
        
        // generate choice buttons
        choicesContainer.innerHTML = '';
        if (node.choices && node.choices.length > 0) {
            node.choices.forEach((choice, idx) => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = choice.text;
                btn.addEventListener('click', () => {
                    // apply stat changes from this choice
                    if (choice.stats) {
                        applyStatMods(choice.stats);
                    }
                    // change node
                    if (choice.nextNode && storyGraph[choice.nextNode]) {
                        currentNodeId = choice.nextNode;
                    } else {
                        // fallback in case missing next node
                        console.warn("missing node", choice.nextNode);
                        currentNodeId = "start";
                    }
                    renderGame();
                });
                choicesContainer.appendChild(btn);
            });
        } else {
            // ending: show restart suggestion
            const restartHintBtn = document.createElement('button');
            restartHintBtn.className = 'choice-btn';
            restartHintBtn.textContent = '📜 Start a new saga (restart)';
            restartHintBtn.addEventListener('click', () => restartGame());
            choicesContainer.appendChild(restartHintBtn);
        }
    }
    
    // restart fully
    function restartGame() {
        currentNodeId = "start";
        currentStats = { valor: 0, shadow: 0 };
        updateStatsUI();
        renderGame();
    }
    
    // initial load & event binding
    function initGame() {
        restartBtn.addEventListener('click', () => restartGame());
        updateStatsUI();
        renderGame();
    }
    
    // start the game
    initGame();
</script>
</body>
</html>
